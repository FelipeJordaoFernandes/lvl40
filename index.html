<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lvl40</title>
  <link href="https://fonts.cdnfonts.com/css/pokemon-solid" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="scene">
    <div class="stars" aria-hidden="true"></div>

    <section class="intro-card">
      <div class="pokeball-wrap" aria-hidden="true">
        <div class="pokeball">
          <div class="ball-half top"></div>
          <div class="ball-half bottom"></div>
          <div class="ball-band"></div>
          <div class="ball-center"></div>
          <div class="burst burst-left"></div>
          <div class="burst burst-right"></div>
          <div class="burst burst-top"></div>
        </div>
      </div>

      <div class="levelup" id="levelup">
        <p class="levelup-label">LEVEL UP!</p>
        <h1 class="pokemon-title">lvl40</h1>
        <p class="birthday-message">feliz aniversário!</p>
        <p class="levelup-subtitle">A jornada continua com mais raridade, XP e lendas!</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
